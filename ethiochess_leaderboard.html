<style>
  #ec-wrap {
    font-family: 'Segoe UI', Arial, sans-serif;
    max-width: 900px;
    margin: 0 auto;
    padding: 16px 0;
  }
  #ec-wrap h2 {
    color: #2d6a2d;
    font-size: 20px;
    margin: 0 0 16px 0;
  }
  #ec-scroll {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  #ec-table {
    width: 100%;
    min-width: 500px;
    border-collapse: collapse;
    font-size: 14px;
  }
  #ec-table thead tr { background-color: #2d6a2d; }
  #ec-table thead th {
    color: #fff;
    padding: 10px 12px;
    text-align: left;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  #ec-table thead th:hover { background-color: #245724; }
  #ec-table thead th.asc::after  { content: ' ▲'; font-size: 10px; }
  #ec-table thead th.desc::after { content: ' ▼'; font-size: 10px; }
  #ec-table tbody tr:nth-child(even) { background-color: #f4faf4; }
  #ec-table tbody tr:hover { background-color: #dff0df; }
  #ec-table tbody td {
    padding: 9px 12px;
    border-bottom: 1px solid #dceadc;
    color: #222;
    white-space: nowrap;
  }
  @media (max-width: 600px) {
    #ec-table { font-size: 12px; }
    #ec-table thead th, #ec-table tbody td { padding: 7px 8px; }
    #ec-wrap h2 { font-size: 17px; }
  }
</style>

<div id="ec-wrap">
  <h2>🏆 EthioChess Daily Blitz</h2>
  <div id="ec-scroll">
    <table id="ec-table">
      <thead>
        <tr>
          <th data-col="0" data-type="num">Arena</th>
          <th data-col="1" data-type="str">Date</th>
          <th data-col="2" data-type="str">Winner</th>
          <th data-col="3" data-type="num">Games Played</th>
          <th data-col="4" data-type="pct">Win Rate</th>
          <th data-col="5" data-type="num">Avg Opponent</th>
          <th data-col="6" data-type="num">Performance</th>
          <th data-col="7" data-type="num">Points</th>
        </tr>
      </thead>
      <tbody id="ec-body">
        <tr><td>1</td><td>5/11/26</td><td><a href="https://lichess.org/@/DanielB99" target="_blank" style="color:#2d6a2d;text-decoration:none;font-weight:600;">DanielB99</a></td><td>12</td><td>75%</td><td>1938</td><td>2230</td><td>19</td></tr>
        <tr><td>2</td><td>5/12/26</td><td><a href="https://lichess.org/@/DanielB99" target="_blank" style="color:#2d6a2d;text-decoration:none;font-weight:600;">DanielB99</a></td><td>11</td><td>73%</td><td>1811</td><td>2084</td><td>17</td></tr>
        <tr><td>3</td><td>5/13/26</td><td><a href="https://lichess.org/@/cheaven" target="_blank" style="color:#2d6a2d;text-decoration:none;font-weight:600;">cheaven</a></td><td>9</td><td>67%</td><td>1847</td><td>2070</td><td>13</td></tr>
        <tr><td>4</td><td>5/14/26</td><td><a href="https://lichess.org/@/Anbesaw" target="_blank" style="color:#2d6a2d;text-decoration:none;font-weight:600;">Anbesaw</a></td><td>12</td><td>92%</td><td>1706</td><td>2163</td><td>23</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
(function() {
  var sortCol = -1, sortDir = 1;

  function getVal(cell, type) {
    var t = cell.textContent.trim();
    if (type === 'num') return parseFloat(t) || 0;
    if (type === 'pct') return parseFloat(t) || 0;
    return t.toLowerCase();
  }

  function sortTable(col, type) {
    var tbody = document.getElementById('ec-body');
    var rows = Array.from(tbody.querySelectorAll('tr'));
    if (sortCol === col) { sortDir *= -1; } else { sortDir = -1; }
    sortCol = col;
    rows.sort(function(a, b) {
      var av = getVal(a.cells[col], type);
      var bv = getVal(b.cells[col], type);
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });
    rows.forEach(function(r) { tbody.appendChild(r); });
    document.querySelectorAll('#ec-table thead th').forEach(function(th, i) {
      th.className = i === col ? (sortDir === 1 ? 'asc' : 'desc') : '';
    });
  }

  document.querySelectorAll('#ec-table thead th').forEach(function(th) {
    th.addEventListener('click', function() {
      sortTable(parseInt(th.dataset.col), th.dataset.type);
    });
  });
})();
</script>
