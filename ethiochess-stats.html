<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EthioChess Community Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'Source Serif 4', serif;
  }

  .stats-section {
    background: #1a1410;
    border-top: 3px solid #c8962a;
    border-bottom: 3px solid #c8962a;
    padding: 3rem 1.5rem;
    text-align: center;
  }

  .stats-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: #c8962a;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  .stats-grid {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 4rem;
    flex-wrap: wrap;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  .stat-number {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 8vw, 5rem);
    font-weight: 900;
    color: #c8962a;
    line-height: 1;
    transition: all 0.3s ease;
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #c4b89a;
  }

  .stat-divider {
    width: 1px;
    height: 60px;
    background: rgba(196,184,154,0.3);
  }

  .loading {
    color: #7a6e5f;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
  }

  @media (max-width: 480px) {
    .stat-divider { display: none; }
    .stats-grid { gap: 2rem; }
  }
</style>
</head>
<body>

<div class="stats-section">
  <div class="stats-tag">EthioChess Community — Live Stats</div>
  <div class="stats-grid">
    <div class="stat-item">
      <div class="stat-number" id="members">—</div>
      <div class="stat-label">Members</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-number">2</div>
      <div class="stat-label">Tournaments</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-number">3</div>
      <div class="stat-label">Countries</div>
    </div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS4QJUA-pMinprBZrmbwzHgRfj2bTgx-e9d5L5_HNVvmz0YSvQJ9Xbtolqd-ofUL6X0ljU2iMuai5Ed/pub?gid=920937340&single=true&output=csv';

function animateCount(el, target, duration) {
  const start = 0;
  const increment = target / (duration / 16);
  let current = start;
  const timer = setInterval(() => {
    current += increment;
    if (current >= target) {
      el.textContent = target;
      clearInterval(timer);
    } else {
      el.textContent = Math.floor(current);
    }
  }, 16);
}

async function fetchMemberCount() {
  try {
    const response = await fetch(CSV_URL);
    const text = await response.text();
    const rows = text.trim().split('\n');
    // Subtract 1 for the header row
    const count = rows.length - 1;
    const el = document.getElementById('members');
    animateCount(el, count, 1500);
  } catch (error) {
    document.getElementById('members').textContent = '—';
  }
}

// Intersection Observer to trigger animation when scrolled into view
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      fetchMemberCount();
      observer.disconnect();
    }
  });
}, { threshold: 0.3 });

observer.observe(document.querySelector('.stats-section'));
</script>

</body>
</html>
